<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitaa King</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .logo { font-size: 48px; margin-bottom: 16px; }
        h1 { color: #1a237e; margin-bottom: 16px; }
        p { color: #666; margin-bottom: 24px; line-height: 1.5; }
        .btn {
            background: #1a237e;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 8px;
        }
        .btn:hover { background: #283593; }
        .btn-outline {
            background: transparent;
            color: #1a237e;
            border: 2px solid #1a237e;
        }
        .btn-outline:hover { background: #f0f0f0; }
        .auto-redirect { margin-top: 24px; font-size: 12px; color: #999; }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
        }
        .debug {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 11px;
            word-break: break-all;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🛍️</div>
        <h1>Kitaa King</h1>
        <p id="message">Processing your request...</p>

        <button class="btn" id="redirectBtn" style="display: none;" onclick="openApp()">
            Open App
        </button>
        <button class="btn btn-outline" onclick="copyLink()" id="copyBtn" style="display: none;">
            Copy Link
        </button>

        <div class="auto-redirect" id="autoMsg" style="display: none;">
            Redirecting in <span id="countdown">3</span> seconds...
        </div>
        <div id="errorMsg" class="error" style="display: none;"></div>
        <div class="debug" id="debugPanel"></div>
    </div>

    <script>
        // ─── READ TOKENS ─────────────────────────────────────────────────────────
        //
        // Supabase inatuma tokens kwa njia mbili kulingana na auth flow:
        //
        // 1. PKCE flow (AuthFlowType.pkce) — App yako inatumia hii:
        //    URL: https://kitaaredirect.netlify.app?code=XXXX
        //    → code iko kwenye QUERY PARAMS (?code=xxx)
        //
        // 2. Implicit flow (zamani):
        //    URL: https://kitaaredirect.netlify.app#access_token=xxx&refresh_token=yyy
        //    → tokens ziko kwenye HASH (#access_token=xxx)
        //
        // Tunashughulikia ZOTE MBILI hapa:

        const queryParams = new URLSearchParams(window.location.search);
        const hashParams  = new URLSearchParams(window.location.hash.substring(1));

        // PKCE: code kwenye query
        const pkceCode = queryParams.get('code');

        // Implicit: tokens kwenye hash
        const accessToken  = hashParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token');
        const type         = hashParams.get('type') || queryParams.get('type') || 'magiclink';
        const errorDesc    = hashParams.get('error_description') || queryParams.get('error_description');

        // ─── BUILD DEEP LINK ─────────────────────────────────────────────────────
        function buildDeepLink() {
            const base = 'com.example.kitaa_king://login-callback';

            if (pkceCode) {
                // PKCE: Peleka code kwa Flutter — Flutter itaita exchangeCodeForSession()
                return base + '?code=' + encodeURIComponent(pkceCode) + '&type=' + encodeURIComponent(type);
            }

            if (accessToken && refreshToken) {
                // Implicit: Peleka tokens kamili kwa Flutter
                return base +
                    '#access_token=' + encodeURIComponent(accessToken) +
                    '&refresh_token=' + encodeURIComponent(refreshToken) +
                    '&type=' + encodeURIComponent(type);
            }

            // Hakuna chochote — fungua app bila token
            return base;
        }

        function openApp() {
            const link = buildDeepLink();
            console.log('Opening:', link);
            window.location.href = link;
        }

        function copyLink() {
            navigator.clipboard.writeText(buildDeepLink()).then(() => {
                alert('Link copied!');
            });
        }

        // ─── DEBUG PANEL (Ondoa kabla ya production) ─────────────────────────────
        document.getElementById('debugPanel').innerHTML =
            '<strong>Debug:</strong><br>' +
            'pkce_code: ' + (pkceCode ? pkceCode.substring(0, 20) + '...' : 'NOT FOUND') + '<br>' +
            'access_token: ' + (accessToken ? accessToken.substring(0, 20) + '...' : 'NOT FOUND') + '<br>' +
            'refresh_token: ' + (refreshToken ? 'FOUND' : 'NOT FOUND') + '<br>' +
            'type: ' + type + '<br>' +
            'error: ' + (errorDesc || 'none');

        // ─── UI LOGIC ─────────────────────────────────────────────────────────────
        const messageEl   = document.getElementById('message');
        const redirectBtn = document.getElementById('redirectBtn');
        const copyBtn     = document.getElementById('copyBtn');
        const autoMsg     = document.getElementById('autoMsg');
        const errorMsg    = document.getElementById('errorMsg');

        if (errorDesc) {
            messageEl.textContent = 'There was a problem with your link.';
            errorMsg.style.display = 'block';
            errorMsg.textContent = errorDesc;

        } else if (pkceCode || (accessToken && refreshToken)) {
            // ✅ Token au code imepatikana — redirect moja kwa moja
            messageEl.innerHTML = 'Login successful!<br>Redirecting you to the app...';
            redirectBtn.style.display = 'inline-block';
            copyBtn.style.display    = 'inline-block';
            autoMsg.style.display    = 'block';

            // Jaribio la kwanza baada ya ms 800 (kwa app inayofanya kazi)
            setTimeout(openApp, 800);

            // Countdown kwa jaribio la pili (cold start)
            let count = 3;
            const countEl = document.getElementById('countdown');
            const timer = setInterval(() => {
                count--;
                if (countEl) countEl.textContent = count;
                if (count <= 0) { clearInterval(timer); openApp(); }
            }, 1000);

        } else {
            messageEl.innerHTML = 'Welcome to Kitaa King!<br>Click below to open the app.';
            redirectBtn.style.display = 'inline-block';
            copyBtn.style.display    = 'inline-block';
            errorMsg.style.display   = 'block';
            errorMsg.textContent     = 'No token found. Please click the magic link from your email again.';
        }
    </script>
</body>
</html>
