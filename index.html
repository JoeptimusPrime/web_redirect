<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitaa King</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }
        h1 {
            color: #1a237e;
            margin-bottom: 16px;
        }
        p {
            color: #666;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .btn {
            background: #1a237e;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 8px;
        }
        .btn:hover {
            background: #283593;
        }
        .btn-outline {
            background: transparent;
            color: #1a237e;
            border: 2px solid #1a237e;
        }
        .btn-outline:hover {
            background: #f0f0f0;
        }
        .auto-redirect {
            margin-top: 24px;
            font-size: 12px;
            color: #999;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🛍️</div>
        <h1>Kitaa King</h1>
        <p id="message">Processing your request...</p>
        
        <a href="com.example.kitaa_king://login-callback" class="btn" id="redirectBtn" style="display: none;">
            Open App
        </a>
        
        <button class="btn btn-outline" onclick="copyLink()" id="copyBtn" style="display: none;">
            Copy Link
        </button>
        
        <div class="auto-redirect" id="autoMsg" style="display: none;">
            Redirecting automatically in <span id="countdown">5</span> seconds...
        </div>
        
        <div id="errorMsg" class="error" style="display: none;">
            Unable to open app automatically. Please click the button above.
        </div>
    </div>

    <script>
        // Get the full URL with all parameters
        const fullUrl = window.location.href;
        console.log('Full URL:', fullUrl);
        
        // Extract token from URL (supports both # and ?)
        let token = null;
        
        // Check for hash (#) fragment
        if (window.location.hash) {
            token = window.location.hash.substring(1);
            console.log('Token from hash:', token);
        }
        
        // Check for query parameters (?)
        if (!token) {
            const urlParams = new URLSearchParams(window.location.search);
            token = urlParams.get('access_token') || urlParams.get('confirmation_token') || urlParams.get('token');
            console.log('Token from query:', token);
        }
        
        // Function to open app with deep link
        function openApp() {
            window.location.href = 'com.example.kitaa_king://login-callback';
        }
        
        // Update UI based on token presence
        const messageEl = document.getElementById('message');
        const redirectBtn = document.getElementById('redirectBtn');
        const copyBtn = document.getElementById('copyBtn');
        const autoMsg = document.getElementById('autoMsg');
        
        if (token) {
            // Valid token found - auto redirect
            messageEl.innerHTML = 'Login successful!<br>Redirecting you to the app...';
            
            // Show button just in case
            redirectBtn.style.display = 'inline-block';
            copyBtn.style.display = 'inline-block';
            autoMsg.style.display = 'block';
            
            // Auto redirect after 3 seconds
            let countdown = 3;
            const countdownEl = document.getElementById('countdown');
            const interval = setInterval(() => {
                countdown--;
                if (countdownEl) countdownEl.textContent = countdown;
                if (countdown <= 0) {
                    clearInterval(interval);
                    openApp();
                }
            }, 1000);
            
            // Manual redirect
            redirectBtn.onclick = function(e) {
                clearInterval(interval);
                openApp();
                return false;
            };
        } else {
            // No token found - show error but still provide button
            messageEl.innerHTML = 'Welcome to Kitaa King!<br>Click below to open the app.';
            redirectBtn.style.display = 'inline-block';
            copyBtn.style.display = 'inline-block';
            
            document.getElementById('errorMsg').style.display = 'block';
            
            redirectBtn.onclick = function(e) {
                openApp();
                return false;
            };
        }
        
        // Copy deep link
        function copyLink() {
            navigator.clipboard.writeText('com.example.kitaa_king://login-callback');
            alert('Link copied! You can now open it manually.');
        }
        
        // Also try to open app immediately if it's a direct redirect
        if (fullUrl.includes('access_token') || fullUrl.includes('confirmation_token')) {
            setTimeout(() => {
                openApp();
            }, 500);
        }
    </script>
</body>
</html>
